<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVIM POC — ChatGPT Mirror</title>
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── VIVIM Design Tokens (Dark, per 04-VISUAL-DESIGN-GUIDE.md) ─── */
    :root {
      --vivim-primary:        #6C5CE7;
      --vivim-primary-hover:  #5A4BD5;
      --vivim-accent:         #00D2D3;
      --bg-primary:           #0D0D14;
      --bg-secondary:         #161625;
      --bg-tertiary:          #1E1E35;
      --bg-hover:             #252540;
      --bg-elevated:          #2A2A45;
      --text-primary:         #E8E8F0;
      --text-secondary:       #A0A0B8;
      --text-tertiary:        #686880;
      --border-primary:       #2A2A45;
      --vivim-success:        #00C853;
      --font-sans:            'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:            'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --radius-md:            8px;
      --radius-lg:            12px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ─── Layout ─── */
    .sidepanel {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      min-width: 280px;
      max-width: 600px;
      position: relative;
    }

    .resize-handle {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: ew-resize;
      background: transparent;
      z-index: 100;
    }
    .resize-handle:hover, .resize-handle--active {
      background: var(--vivim-primary);
      opacity: 0.5;
    }

    /* ─── Header ─── */
    .sidepanel__header {
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0;
    }
    .sidepanel__header__brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--vivim-primary);
    }
    .sidepanel__header__brand img {
      width: 20px;
      height: 20px;
    }
    .sidepanel__header__status {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }
    .status-dot--connected {
      background: var(--vivim-success);
      box-shadow: 0 0 6px var(--vivim-success);
    }
    .status-dot--streaming {
      background: var(--vivim-accent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ─── Messages Area ─── */
    .sidepanel__messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidepanel__messages::-webkit-scrollbar {
      width: 6px;
    }
    .sidepanel__messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidepanel__messages::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 3px;
    }

    /* ─── Empty State ─── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      text-align: center;
      padding: 24px;
    }
    .empty-state__icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .empty-state__title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .empty-state__desc {
      font-size: 12px;
    }

    /* ─── Message Bubbles ─── */
    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 13px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg--user {
      align-self: flex-end;
      background: var(--vivim-primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg--assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-left: 3px solid var(--vivim-primary);
      border-bottom-left-radius: 4px;
    }
    .msg__meta {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 6px;
      display: flex;
      gap: 8px;
    }
    .msg--user .msg__meta {
      color: rgba(255, 255, 255, 0.6);
    }
    .msg__model {
      font-family: var(--font-mono);
      font-size: 10px;
    }

    /* ─── Streaming indicator ─── */
    .msg--streaming {
      position: relative;
    }
    .msg--streaming::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 14px;
      background: var(--vivim-primary);
      margin-left: 4px;
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ─── Input Area ─── */
    .sidepanel__input {
      padding: 12px;
      border-top: 1px solid var(--border-primary);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidepanel__input textarea {
      flex: 1;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 13px;
      font-family: var(--font-sans);
      resize: none;
      height: 42px;
      outline: none;
      transition: border-color 0.15s;
    }
    .sidepanel__input textarea:focus {
      border-color: var(--vivim-primary);
    }
    .sidepanel__input textarea::placeholder {
      color: var(--text-tertiary);
    }
    .sidepanel__input button {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-md);
      background: var(--vivim-primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .sidepanel__input button:hover:not(:disabled) {
      background: var(--vivim-primary-hover);
    }
    .sidepanel__input button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ─── Status Bar ─── */
    .sidepanel__status {
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidepanel__status button {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 4px;
    }
    .sidepanel__status button:hover {
      color: var(--text-primary);
    }
    .status-controls {
      display: flex;
      gap: 8px;
    }

    /* History modal */
    .history-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .history-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .history-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: 16px;
      max-width: 400px;
      max-height: 60vh;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }

    .history-list {
      margin-top: 12px;
    }

    .history-item {
      padding: 8px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }

    .history-item:hover {
      background: var(--bg-hover);
      border-color: var(--border-primary);
    }

    .history-title {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .history-meta {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* ─── Utility ─── */
    .hidden { display: none !important; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <div class="sidepanel" id="sidepanel">
    <!-- Resize Handle -->
    <div class="resize-handle" id="resizeHandle" title="Drag to resize"></div>
    <!-- Header -->
    <div class="sidepanel__header">
<div class="sidepanel__header__brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" role="img" aria-label="VIVIM logo">
          <rect width="20" height="20" rx="4" fill="#6C5CE7"/>
          <text x="10" y="15" text-anchor="middle" fill="white" font-size="12" font-weight="bold">V</text>
        </svg>
        <span>VIVIM</span>
      </div>
      <div class="sidepanel__header__controls">
        <button class="header-btn" id="newChatBtn" type="button" aria-label="Start new conversation" title="New Chat">➕</button>
        <button class="header-btn" id="historyBtn" type="button" aria-label="Conversation history" title="History">📚</button>
        <button class="header-btn" id="providerSelect" type="button" aria-label="Select AI provider" title="Select provider">
          <span class="provider-dot" id="providerDot" aria-hidden="true"></span>
          <span id="providerName">ChatGPT</span>
        </button>
        <button class="header-btn" id="exportBtn" type="button" aria-label="Export conversation" title="Export">📥</button>
        <button class="header-btn" id="privacyBtn" type="button" aria-label="Privacy and telemetry settings" title="Privacy & Telemetry">⚙️</button>
      </div>
      <div class="sidepanel__header__right">
        <div class="sidepanel__header__status">
          <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          <span id="statusText" aria-live="polite">Connecting...</span>
        </div>
        <div class="header-tabs">
          <button type="button" class="header-tab active" data-tab="chat">Chat</button>
          <button type="button" class="header-tab" data-tab="debug">Debug</button>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="sidepanel__toolbar">
      <label for="searchInput" class="sr-only">Search messages</label>
      <input type="text" id="searchInput" placeholder="Search messages..." class="toolbar-search" aria-describedby="search-desc">
      <div id="search-desc" class="sr-only">Search through conversation messages</div>
    </div>

    <!-- Chat Tab -->
    <div class="tab-content tab-content--active" id="chatContent">
      <div class="sidepanel__messages" id="messagesArea">
        <div class="empty-state" id="emptyState">
          <div class="empty-state__icon">💬</div>
          <div class="empty-state__title">No messages yet</div>
          <div class="empty-state__desc">Type a prompt below or start chatting</div>
        </div>
      </div>
    </div>

    <!-- Debug Tab -->
    <div class="tab-content" id="debugContent">
      <div class="debug-panel">
        <div class="debug-header">
          <span>Stream/Parser Debug</span>
          <div class="debug-controls">
            <button id="debugCaptureBtn" type="button" class="debug-btn debug-btn--primary">Capture</button>
            <button id="debugConsoleBtn" type="button" class="debug-btn">Console</button>
            <button id="debugCopyAllBtn" type="button" class="debug-btn">Copy</button>
            <button id="debugExportBtn" type="button" class="debug-btn">Export</button>
            <button id="debugClearBtn" type="button" class="debug-btn">Clear</button>
          </div>
        </div>
        <div class="debug-filters">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="console">Console</button>
          <button type="button" class="filter-btn" data-filter="stream">Stream</button>
          <button type="button" class="filter-btn" data-filter="error">Error</button>
        </div>
        <div class="debug-data" id="debugData">
          <div class="empty-state">
            <div class="empty-state__icon">🔍</div>
            <div class="empty-state__title">No raw data captured</div>
            <div class="empty-state__desc">Click "Start Capture" to capture raw message data</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="sidepanel__input">
      <label for="promptInput" class="sr-only">Type your prompt</label>
      <textarea
        id="promptInput"
        placeholder="Type your prompt..."
        rows="1"
        aria-describedby="prompt-desc"
      ></textarea>
      <div id="prompt-desc" class="sr-only">Send messages to the AI assistant</div>
      <button id="sendBtn" type="button" aria-label="Send message" title="Send (Cmd+Enter)" disabled>▶</button>
    </div>

    <!-- Status Bar -->
    <div class="sidepanel__status">
      <span id="msgCount" aria-live="polite">0 messages</span>
      <div class="status-controls">
        <button id="debugToggleBtn" type="button" class="debug-toggle-btn" aria-label="Toggle Debug Panel" title="Debug">🐛 Debug</button>
        <button id="testBtn" type="button" aria-label="Test communication" title="Test Comm">🧪</button>
        <button id="reloadBtn" type="button" aria-label="Reload conversation from page" title="Reload from Page">🔄</button>
        <button id="clearBtn" type="button" aria-label="Clear conversation" title="Clear conversation">Clear</button>
      </div>
    </div>
  </div>

  <style>
    .sidepanel__header__controls { display: flex; gap: 8px; align-items: center; }
    .sidepanel__header__right { display: flex; align-items: center; gap: 12px; }
    .header-btn { background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 6px; padding: 4px 8px; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .header-btn:hover { background: var(--bg-hover); }
    .provider-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--vivim-primary); }
    .header-tabs { display: flex; gap: 2px; }
    .header-tab { background: var(--bg-tertiary); border: 1px solid var(--border-primary); border-radius: 4px; padding: 4px 10px; color: var(--text-secondary); cursor: pointer; font-size: 11px; }
    .header-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
    .header-tab.active { background: var(--vivim-primary); border-color: var(--vivim-primary); color: white; }
    .sidepanel__toolbar { padding: 8px 12px; border-bottom: 1px solid var(--border-primary); display: flex; }
    .toolbar-search { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 12px; }
    .toolbar-search:focus { border-color: var(--vivim-primary); outline: none; }
    .toolbar-search::placeholder { color: var(--text-tertiary); }
    .msg__actions { position: absolute; top: 4px; right: 4px; display: flex; gap: 4px; }
    .msg { position: relative; }
    .msg__action { background: var(--bg-tertiary); border: none; border-radius: 4px; padding: 4px 6px; cursor: pointer; font-size: 12px; opacity: 0.7; }
    .msg__action:hover { opacity: 1; background: var(--bg-hover); }
    .export-menu { position: absolute; right: 60px; top: 48px; background: var(--bg-elevated); border: 1px solid var(--border-primary); border-radius: 8px; padding: 4px; z-index: 100; display: flex; flex-direction: column; }
    .export-menu button { background: none; border: none; color: var(--text-primary); padding: 8px 16px; text-align: left; cursor: pointer; font-size: 12px; border-radius: 4px; }
    .export-menu button:hover { background: var(--bg-hover); }
    .provider-menu { position: absolute; right: 12px; top: 48px; background: var(--bg-elevated); border: 1px solid var(--border-primary); border-radius: 8px; padding: 4px; z-index: 100; max-height: 200px; overflow-y: auto; }
    .provider-option { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--text-primary); padding: 8px 12px; text-align: left; cursor: pointer; font-size: 12px; width: 100%; }
    .provider-option:hover { background: var(--bg-hover); }
    .provider-option .provider-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: var(--vivim-primary); color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px; z-index: 1000; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .header-tabs { display: flex; gap: 4px; margin-left: 12px; }
    .header-tab { background: none; border: 1px solid var(--border-primary); border-radius: 4px; padding: 4px 12px; color: var(--text-secondary); cursor: pointer; font-size: 11px; }
    .header-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
    .header-tab.active { background: var(--vivim-primary); border-color: var(--vivim-primary); color: white; }
    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content--active { display: flex; }
    .debug-panel { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow: hidden; }
    .debug-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .debug-controls { display: flex; gap: 6px; }
    .debug-btn { background: var(--bg-tertiary); border: 1px solid var(--border-primary); border-radius: 4px; padding: 4px 10px; color: var(--text-primary); cursor: pointer; font-size: 11px; }
    .debug-btn:hover { background: var(--bg-hover); }
    .debug-btn--primary { background: var(--vivim-primary); border-color: var(--vivim-primary); }
    .debug-btn--primary:hover { background: var(--vivim-primary-hover); }
    .debug-btn--active { background: var(--vivim-success); border-color: var(--vivim-success); }
    .debug-filters { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
    .debug-data { flex: 1; overflow-y: auto; background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 6px; padding: 8px; }
    .debug-entry { margin-bottom: 8px; padding: 8px; border-radius: 4px; background: var(--bg-tertiary); border-left: 3px solid var(--vivim-primary); font-family: var(--font-mono); font-size: 11px; }
    .debug-entry.request { border-left-color: #007bff; }
    .debug-entry.response { border-left-color: #28a745; }
    .debug-entry.stream { border-left-color: #ffc107; }
    .debug-entry.error { border-left-color: #dc3545; background: #f8d7da; }
    .debug-entry__header { display: flex; justify-content: space-between; margin-bottom: 4px; color: var(--text-secondary); }
    .debug-entry__type { font-weight: 600; }
    .debug-entry__time { color: var(--text-tertiary); font-size: 10px; }
    .debug-entry__content { word-break: break-all; max-height: 100px; overflow: hidden; }
    .debug-entry__content.expanded { max-height: none; }

    /* Settings Modal */
    .settings-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .settings-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.5); }
    .settings-content { background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: var(--radius-lg); max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; z-index: 1; width: 90%; }
    .settings-header { padding: 16px 20px; border-bottom: 1px solid var(--border-primary); display: flex; align-items: center; justify-content: space-between; }
    .settings-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
    .settings-close { background: none; border: none; color: var(--text-primary); font-size: 20px; cursor: pointer; padding: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .settings-body { padding: 20px; }
    .settings-section { margin-bottom: 24px; }
    .settings-section h4 { margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .settings-description { margin: 0 0 12px 0; font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
    .setting-item { margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
    .setting-item label { font-size: 13px; color: var(--text-primary); }
    .setting-item select { background: var(--bg-tertiary); border: 1px solid var(--border-primary); border-radius: var(--radius-md); padding: 8px 12px; color: var(--text-primary); font-size: 13px; }
    .setting-item button { background: var(--vivim-primary); border: none; border-radius: var(--radius-md); padding: 8px 16px; color: white; cursor: pointer; font-size: 13px; align-self: flex-start; }
    .setting-item button:hover { background: var(--vivim-primary-hover); }
    .setting-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .setting-toggle input[type="checkbox"] { display: none; }
    .toggle-slider { width: 36px; height: 20px; background: var(--bg-tertiary); border-radius: 10px; position: relative; transition: background 0.2s; }
    .toggle-slider::before { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--text-tertiary); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .setting-toggle input[type="checkbox"]:checked + .toggle-slider { background: var(--vivim-primary); }
    .setting-toggle input[type="checkbox"]:checked + .toggle-slider::before { transform: translateX(16px); background: white; }
  </style>

  <script type="module" src="./ui/index.js"></script>
</body>
</html>
