<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVIM Test Page</title>
  <style>
    /* Same styles as sidepanel.html */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --vivim-primary:        #6C5CE7;
      --vivim-primary-hover:  #5A4BD5;
      --vivim-accent:         #00D2D3;
      --bg-primary:           #0D0D14;
      --bg-secondary:         #161625;
      --bg-tertiary:          #1E1E35;
      --bg-hover:             #252540;
      --bg-elevated:          #2A2A45;
      --text-primary:         #E8E8F0;
      --text-secondary:       #A0A0B8;
      --text-tertiary:        #686880;
      --border-primary:       #2A2A45;
      --vivim-success:        #00C853;
      --font-sans:            'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:            'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --radius-md:            8px;
      --radius-lg:            12px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
    }

    .sidepanel {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .sidepanel__header {
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0;
    }
    .sidepanel__header__brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--vivim-primary);
    }
    .sidepanel__header__brand img {
      width: 20px;
      height: 20px;
    }

    .sidepanel__messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      text-align: center;
      padding: 24px;
    }
    .empty-state__icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .empty-state__title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .empty-state__desc {
      font-size: 12px;
    }

    .sidepanel__input {
      padding: 12px;
      border-top: 1px solid var(--border-primary);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidepanel__input textarea {
      flex: 1;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: var(--font-sans);
      resize: none;
      height: 42px;
      outline: none;
    }
    .sidepanel__input textarea:focus {
      border-color: var(--vivim-primary);
    }
    .sidepanel__input button {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--vivim-primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sidepanel__input button:hover:not(:disabled) {
      background: #5A4BD5;
    }
    .sidepanel__input button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .sidepanel__status {
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="sidepanel">
    <!-- Header -->
    <div class="sidepanel__header">
      <div class="sidepanel__header__brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" role="img" aria-label="VIVIM logo">
          <rect width="20" height="20" rx="4" fill="#6C5CE7"/>
          <text x="10" y="15" text-anchor="middle" fill="white" font-size="12" font-weight="bold">V</text>
        </svg>
        <span>VIVIM</span>
      </div>
      <div class="sidepanel__header__controls">
        <button class="header-btn" id="newChatBtn" type="button" aria-label="Start new conversation" title="New Chat">➕</button>
        <button class="header-btn" id="providerSelect" type="button" aria-label="Select AI provider" title="Select provider">
          <span class="provider-dot" id="providerDot" aria-hidden="true"></span>
          <span id="providerName">ChatGPT</span>
        </button>
      </div>
      <div class="sidepanel__header__status">
        <span class="status-dot" id="statusDot" aria-hidden="true"></span>
        <span id="statusText" aria-live="polite">Ready</span>
      </div>
    </div>

    <!-- Messages Area -->
    <div class="sidepanel__messages" id="messagesArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-state__icon">💬</div>
        <div class="empty-state__title">No messages yet</div>
        <div class="empty-state__desc">Type a prompt below or start chatting</div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="sidepanel__input">
      <label for="promptInput" class="sr-only">Type your prompt</label>
      <textarea
        id="promptInput"
        placeholder="Type your prompt..."
        rows="1"
        aria-describedby="prompt-desc"
      ></textarea>
      <div id="prompt-desc" class="sr-only">Send messages to the AI assistant</div>
      <button id="sendBtn" type="button" aria-label="Send message" title="Send (Cmd+Enter)" disabled>▶</button>
    </div>

    <!-- Status Bar -->
    <div class="sidepanel__status">
      <span id="msgCount" aria-live="polite">0 messages</span>
      <div class="status-controls">
        <button id="clearBtn" type="button" aria-label="Clear conversation" title="Clear conversation">Clear</button>
      </div>
    </div>
  </div>

  <style>
    .sidepanel__header__controls { display: flex; gap: 8px; align-items: center; }
    .header-btn { background: #161625; border: 1px solid #2A2A45; border-radius: 6px; padding: 4px 8px; color: #E8E8F0; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .header-btn:hover { background: #252540; }
    .provider-dot { width: 8px; height: 8px; border-radius: 50%; background: #6C5CE7; }
    .provider-menu { position: absolute; right: 12px; top: 48px; background: #2A2A45; border: 1px solid #2A2A45; border-radius: 8px; padding: 4px; z-index: 100; max-height: 200px; overflow-y: auto; }
    .provider-option { display: flex; align-items: center; gap: 8px; background: none; border: none; color: #E8E8F0; padding: 8px 12px; text-align: left; cursor: pointer; font-size: 12px; width: 100%; }
    .provider-option:hover { background: #252540; }
    .provider-option .provider-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: #6C5CE7; color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px; z-index: 1000; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  </style>

  <!-- <script type="module" src="./ui/index.js"></script> -->
</body>
</html>
