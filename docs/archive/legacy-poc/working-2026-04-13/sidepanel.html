<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVIM POC — ChatGPT Mirror</title>
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── VIVIM Design Tokens (Dark, per 04-VISUAL-DESIGN-GUIDE.md) ─── */
    :root {
      --vivim-primary:        #6C5CE7;
      --vivim-primary-hover:  #5A4BD5;
      --vivim-accent:         #00D2D3;
      --bg-primary:           #0D0D14;
      --bg-secondary:         #161625;
      --bg-tertiary:          #1E1E35;
      --bg-hover:             #252540;
      --text-primary:         #E8E8F0;
      --text-secondary:       #A0A0B8;
      --text-tertiary:        #686880;
      --border-primary:       #2A2A45;
      --vivim-success:        #00C853;
      --font-sans:            'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:            'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --radius-md:            8px;
      --radius-lg:            12px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ─── Layout ─── */
    .sidepanel {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* ─── Header ─── */
    .sidepanel__header {
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0;
    }
    .sidepanel__header__brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--vivim-primary);
    }
    .sidepanel__header__brand img {
      width: 20px;
      height: 20px;
    }
    .sidepanel__header__status {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }
    .status-dot--connected {
      background: var(--vivim-success);
      box-shadow: 0 0 6px var(--vivim-success);
    }
    .status-dot--streaming {
      background: var(--vivim-accent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ─── Messages Area ─── */
    .sidepanel__messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidepanel__messages::-webkit-scrollbar {
      width: 6px;
    }
    .sidepanel__messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidepanel__messages::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 3px;
    }

    /* ─── Empty State ─── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      text-align: center;
      padding: 24px;
    }
    .empty-state__icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .empty-state__title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .empty-state__desc {
      font-size: 12px;
    }

    /* ─── Message Bubbles ─── */
    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 13px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg--user {
      align-self: flex-end;
      background: var(--vivim-primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg--assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-left: 3px solid var(--vivim-primary);
      border-bottom-left-radius: 4px;
    }
    .msg__meta {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 6px;
      display: flex;
      gap: 8px;
    }
    .msg--user .msg__meta {
      color: rgba(255, 255, 255, 0.6);
    }
    .msg__model {
      font-family: var(--font-mono);
      font-size: 10px;
    }

    /* ─── Streaming indicator ─── */
    .msg--streaming {
      position: relative;
    }
    .msg--streaming::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 14px;
      background: var(--vivim-primary);
      margin-left: 4px;
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ─── Input Area ─── */
    .sidepanel__input {
      padding: 12px;
      border-top: 1px solid var(--border-primary);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidepanel__input textarea {
      flex: 1;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 13px;
      font-family: var(--font-sans);
      resize: none;
      height: 42px;
      outline: none;
      transition: border-color 0.15s;
    }
    .sidepanel__input textarea:focus {
      border-color: var(--vivim-primary);
    }
    .sidepanel__input textarea::placeholder {
      color: var(--text-tertiary);
    }
    .sidepanel__input button {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-md);
      background: var(--vivim-primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .sidepanel__input button:hover:not(:disabled) {
      background: var(--vivim-primary-hover);
    }
    .sidepanel__input button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ─── Status Bar ─── */
    .sidepanel__status {
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidepanel__status button {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 4px;
    }
    .sidepanel__status button:hover {
      color: var(--text-primary);
    }

    /* ─── Utility ─── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="sidepanel">
    <!-- Header -->
    <div class="sidepanel__header">
      <div class="sidepanel__header__brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect width="20" height="20" rx="4" fill="#6C5CE7"/>
          <text x="10" y="15" text-anchor="middle" fill="white" font-size="12" font-weight="bold">V</text>
        </svg>
        <span>VIVIM POC</span>
      </div>
      <div class="sidepanel__header__status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </div>

    <!-- Messages Area -->
    <div class="sidepanel__messages" id="messagesArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-state__icon">💬</div>
        <div class="empty-state__title">No messages yet</div>
        <div class="empty-state__desc">Type a prompt below or start chatting on ChatGPT</div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="sidepanel__input">
      <textarea
        id="promptInput"
        placeholder="Type your prompt..."
        rows="1"
      ></textarea>
      <button id="sendBtn" title="Send prompt" disabled>▶</button>
    </div>

    <!-- Status Bar -->
    <div class="sidepanel__status">
      <span id="msgCount">0 messages</span>
      <button id="clearBtn" title="Clear conversation">Clear</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
